name: 📊 XAUUSD Scalping Bot — Hourly Alert

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Alasan menjalankan manual"
        required: false
        default: "Manual trigger"

jobs:
  scalping-alert:
    name: 🤖 Analisis XAUUSD & Kirim Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📊 Jalankan analisis & kirim alert Telegram
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/analyzer.py

      - name: 📝 Log eksekusi
        if: always()
        run: |
          echo "Eksekusi selesai: $(TZ=Asia/Jakarta date)"
