name: 📊 XAUUSD Scalping Bot — Hourly Alert

on:
  schedule:
    - cron: "0 * * * *"  # Setiap jam jam 00:00
  workflow_dispatch:
    inputs:
      reason:
        description: "Alasan menjalankan manual"
        required: false
        default: "Manual trigger"

jobs:
  scalping-alert:
    name: 🤖 Analisis XAUUSD & Kirim Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4  # ✅ Updated

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"  # ✅ Lebih spesifik

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Cek file requirements.txt
        run: |
          if [ ! -f "requirements.txt" ]; then
            echo "❌ requirements.txt tidak ditemukan!"
            exit 1
          fi
          echo "✅ requirements.txt ditemukan"

      - name: 🔍 Cek file analyzer.py
        run: |
          if [ ! -f "src/analyzer.py" ]; then
            echo "❌ src/analyzer.py tidak ditemukan!"
            exit 1
          fi
          echo "✅ src/analyzer.py ditemukan"

      - name: 📊 Jalankan analisis & kirim alert Telegram
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          REASON: ${{ github.event.inputs.reason || 'Scheduled run' }}
        run: python src/analyzer.py

      - name: 📝 Log eksekusi & status
        if: always()
        run: |
          echo "⏰ Eksekusi selesai: $(TZ=Asia/Jakarta date)"
          echo "📋 Trigger: ${{ env.REASON }}"
          echo "✅ Workflow Status: ${{ job.status }}"
